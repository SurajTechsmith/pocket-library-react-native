<!doctype html>
<html>
  <head>
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
      }
      #viewer {
        width: 100vw;
        height: 100vh;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #52525b;
        font-family: sans-serif;
        font-size: 14px;
        gap: 12px;
        background: #0a0a0a;
        z-index: 10;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 2px solid #1f1f1f;
        border-top-color: #f59e0b;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <span>Loading book...</span>
    </div>
    <div id="viewer"></div>

    <script>
      let book, rendition;
      let startX = 0;
      let currentPage = 1;

      window.addEventListener("message", async (e) => {
        let msg;
        try {
          msg = JSON.parse(e.data);
        } catch {
          return;
        }

        if (msg.type === "LOAD") {
          document.body.style.background =
            msg.theme === "light"
              ? "#ffffff"
              : msg.theme === "sepia"
                ? "#f8f0e3"
                : "#0a0a0a";

          book = ePub(msg.base64, { encoding: "base64" });
          rendition = book.renderTo("viewer", {
            width: window.innerWidth,
            height: window.innerHeight,
            flow: "paginated",
          });

          await rendition.display(msg.cfi || undefined);
          document.getElementById("loading").style.display = "none";

          // apply theme to epub content
          rendition.themes.register("dark", {
            body: { background: "#0a0a0a", color: "#e4e4e7" },
          });
          rendition.themes.register("sepia", {
            body: { background: "#f8f0e3", color: "#3d2b1f" },
          });
          rendition.themes.register("light", {
            body: { background: "#ffffff", color: "#000000" },
          });
          rendition.themes.select(msg.theme || "dark");

          rendition.on("relocated", (loc) => {
            currentPage = loc.start.displayed.page;
            window.ReactNativeWebView.postMessage(
              JSON.stringify({
                type: "PAGE_CHANGE",
                page: currentPage,
                total: loc.start.displayed.total,
                cfi: loc.start.cfi,
              }),
            );
          });
        }

        if (msg.type === "GOTO") {
          if (msg.cfi) rendition.display(msg.cfi);
          else if (msg.page) {
            // epub.js doesn't support page number jump directly
            // we just go forward/back relatively
          }
        }

        if (msg.type === "THEME") {
          document.body.style.background =
            msg.theme === "light"
              ? "#ffffff"
              : msg.theme === "sepia"
                ? "#f8f0e3"
                : "#0a0a0a";
          if (rendition) rendition.themes.select(msg.theme);
        }
      });

      // swipe navigation
      document.addEventListener(
        "touchstart",
        (e) => {
          startX = e.touches[0].clientX;
        },
        { passive: true },
      );

      document.addEventListener("touchend", (e) => {
        const diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) < 60) return;
        if (diff > 0) rendition?.next();
        if (diff < 0) rendition?.prev();
      });
    </script>
  </body>
</html>
